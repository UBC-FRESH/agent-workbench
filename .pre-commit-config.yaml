repos:
  - repo: local
    hooks:
      - id: ruff-format-check
        name: ruff format check
        entry: ruff format --check src tests
        language: python
        additional_dependencies: [ruff>=0.15]
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: ruff check src tests
        language: python
        additional_dependencies: [ruff>=0.15]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: mypy src
        language: python
        additional_dependencies:
          - github-copilot-sdk>=1.0.5
          - mypy>=2.2
          - pypdf>=5
          - PyYAML>=6
          - types-PyYAML>=6.0
        pass_filenames: false
